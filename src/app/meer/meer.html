<mat-toolbar>
    <a href="/" class="logo">
        <img src="logo2.svg" alt="app logo" height="30" width="30">
        <span>EOL</span>
    </a>
    <div style="flex-grow: 1; display: flex; justify-content: center;">
        @for(meer of meere; track meer.path){
            <a mat-button [routerLink]="[`/${meer.path}`]" [class.active]="meer.path === this.activeOzean" (click)="onOceanClick(meer.path)">{{meer.path}}</a>
        }
    </div>
</mat-toolbar>
<router-outlet></router-outlet>
