<div class="top">
    <a href="/" class="logo">
        <img src="logo2.svg" alt="app logo" height="30" width="30">
        <span>EOL</span>
    </a>
    <div class="menu">
        @for(meer of meere; track meer.path){
        <a [routerLink]="[`/${meer.path}`]" [class.active]="meer.path === this.activeOzeanPath"
            (click)="onOceanClick(meer.path)" class="meu-item">
            {{meer.name}}
        </a>
        }
    </div>
</div>
<router-outlet></router-outlet>
