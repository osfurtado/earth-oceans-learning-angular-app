<mat-toolbar>
    <a [href]="this.baseUrl" class="logo">
        <img src="logo2.svg" alt="app logo" height="30" width="30">
        <span>EOL</span>
    </a>
    <div style="flex-grow: 1; display: flex; justify-content: center;">
        @for(meer of meere; track meer.name){
            <a mat-button [class.active]="meer.path === this.activeOzean" (click)="onOceanClick(meer.path)">{{meer.name}}</a>
        }
    </div>
</mat-toolbar>
<app-meer-details [meer]="this.activeOzean"></app-meer-details>
